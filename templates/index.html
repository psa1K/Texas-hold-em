<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- ====== 顶部导航栏 ====== -->
    <header id="header">
        <h1>♠ Texas Hold'em Poker ♠</h1>
        <div id="header-controls">
            <button id="btn-new-game" class="btn btn-header">新游戏</button>
            <button id="btn-settings" class="btn btn-header">设置</button>
            <span id="hand-counter">手牌 #0</span>
        </div>
    </header>

    <!-- ====== 主游戏区 ====== -->
    <div id="main-container">
        <!-- 左侧：游戏桌 -->
        <div id="table-container">
            <!-- 牌桌工具栏 -->
            <div id="table-toolbar">
                <span id="hand-counter-toolbar">等待开始</span>
            </div>
            <div id="poker-table">
                <!-- 社区牌区 -->
                <div id="community-cards">
                    <div class="community-card slot" data-slot="0"></div>
                    <div class="community-card slot" data-slot="1"></div>
                    <div class="community-card slot" data-slot="2"></div>
                    <div class="community-card slot" data-slot="3"></div>
                    <div class="community-card slot" data-slot="4"></div>
                </div>

                <!-- 底池显示 -->
                <div id="pot-display">
                    <span id="pot-amount">Pot: $0</span>
                    <span id="pot-phase">WAITING</span>
                </div>

                <!-- 玩家位置 -->
                <div id="players-container">
                    <!-- 动态生成玩家位置 -->
                </div>
            </div>

            <!-- 动作面板 -->
            <div id="action-panel">
                <div id="action-info">
                    <span id="action-status">等待游戏开始...</span>
                    <span id="action-to-call"></span>
                </div>
                <div id="action-buttons">
                    <button id="btn-fold" class="btn btn-action btn-danger" disabled>Fold</button>
                    <button id="btn-check" class="btn btn-action" disabled>Check</button>
                    <button id="btn-call" class="btn btn-action btn-primary" disabled>Call</button>
                    <button id="btn-raise" class="btn btn-action btn-warning" disabled>Raise</button>
                </div>
                <div id="bet-controls" style="display:none;">
                    <input type="range" id="bet-slider" min="0" max="1000" value="0" step="1">
                    <input type="number" id="bet-amount" min="0" value="0">
                    <button id="btn-bet-confirm" class="btn btn-action btn-warning">确认下注</button>
                </div>
            </div>
        </div>

        <!-- 右侧：信息面板 -->
        <div id="side-panel">
            <!-- 标签页 -->
            <div id="panel-tabs">
                <button class="tab-btn active" data-tab="analysis">战局分析</button>
                <button class="tab-btn" data-tab="history">牌局历史</button>
                <button class="tab-btn" data-tab="stats">统计数据</button>
            </div>

            <!-- 战局分析面板 -->
            <div id="panel-analysis" class="tab-content active">
                <div id="hand-strength-display">
                    <h3>手牌强度</h3>
                    <div id="hand-strength-bar">
                        <div id="hand-strength-fill"></div>
                    </div>
                    <span id="hand-strength-label">--</span>
                </div>
                <div id="pot-odds-display">
                    <h3>底池赔率</h3>
                    <div id="pot-odds-info">
                        <div><span>底池:</span><span id="ao-pot">$0</span></div>
                        <div><span>跟注:</span><span id="ao-to-call">$0</span></div>
                        <div><span>赔率比:</span><span id="ao-ratio">--</span></div>
                        <div><span>所需胜率:</span><span id="ao-required">0%</span></div>
                    </div>
                </div>
                <div id="draw-info-display">
                    <h3>牌型概率 <span id="draw-phase-label" class="phase-label"></span></h3>
                    <div id="hand-type-probs">
                        <!-- 动态由 JS 生成 -->
                    </div>
                </div>
            </div>

            <!-- 牌局历史面板 -->
            <div id="panel-history" class="tab-content">
                <div id="history-toolbar">
                    <span>牌局记录</span>
                    <button id="btn-replay-recent" class="btn btn-sm">🔄 回放最近一手</button>
                </div>
                <div id="history-list"></div>
                <!-- 回放控件（回放模式时显示） -->
                <div id="replay-controls" class="replay-controls">
                    <div class="replay-controls-header">
                        <span id="replay-step-counter">0 / 0</span>
                        <select id="replay-speed">
                            <option value="1600">0.25x</option>
                            <option value="800">0.5x</option>
                            <option value="400" selected>1x</option>
                            <option value="200">2x</option>
                        </select>
                    </div>
                    <div id="replay-progress-container">
                        <div id="replay-progress-bar">
                            <div id="replay-progress-fill"></div>
                        </div>
                    </div>
                    <div id="replay-action-info"></div>
                    <div class="replay-buttons">
                        <button id="btn-replay-prev" class="btn btn-sm">◀</button>
                        <button id="btn-replay-play" class="btn btn-primary btn-sm">▶ 播放</button>
                        <button id="btn-replay-next" class="btn btn-sm">▶</button>
                        <button id="btn-replay-reset" class="btn btn-sm">↺</button>
                        <button id="btn-replay-exit" class="btn btn-sm btn-danger">退出回放</button>
                    </div>
                </div>
            </div>

            <!-- 统计面板 -->
            <div id="panel-stats" class="tab-content">
                <div id="stats-table-container">
                    <table id="stats-table">
                        <thead>
                            <tr>
                                <th>玩家</th>
                                <th>VPIP</th>
                                <th>PFR</th>
                                <th>AF</th>
                                <th>胜率</th>
                                <th>盈亏</th>
                            </tr>
                        </thead>
                        <tbody id="stats-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== LLM 设置弹窗 ====== -->
    <div id="modal-settings" class="modal" style="display:none;">
        <div class="modal-content settings-content">
            <h2>⚙️ 游戏设置</h2>

            <!-- 牌组皮肤 -->
            <fieldset class="settings-section">
                <legend>🃏 牌组皮肤</legend>
                <div class="form-row deck-skin-row">
                    <label>当前牌组</label>
                    <span id="deck-skin-label" class="deck-skin-current">经典 PNG</span>
                    <button type="button" id="btn-cycle-deck" class="btn btn-sm">切换牌组</button>
                </div>
                <p class="form-hint">立即生效，偏好保存在浏览器本地。</p>
            </fieldset>

            <!-- 主力模型 -->
            <fieldset class="settings-section">
                <legend>🎯 主力模型</legend>
                <div class="form-row">
                    <label>提供商</label>
                    <select id="llm-primary-provider">
                        <option value="deepseek">DeepSeek</option>
                        <option value="qwen">通义千问 (Qwen)</option>
                        <option value="glm">智谱 GLM</option>
                        <option value="kimi">Kimi (月之暗面)</option>
                        <option value="minimax">MiniMax</option>
                        <option value="openai">OpenAI (GPT)</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="ollama">Ollama (本地)</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>模型 ID</label>
                    <input type="text" id="llm-primary-model" placeholder="claude-sonnet-4-20250514">
                </div>
                <div class="form-row">
                    <label>API Key</label>
                    <input type="password" id="llm-primary-api-key" placeholder="留空则使用环境变量">
                </div>
                <div class="form-row">
                    <label>Base URL <small>(可选)</small></label>
                    <input type="text" id="llm-primary-base-url" placeholder="http://localhost:11434">
                </div>
                <div class="form-row form-row-3">
                    <div>
                        <label>Temperature: <span id="llm-temp-val">0.10</span></label>
                        <input type="range" id="llm-primary-temperature" min="0" max="1" step="0.05" value="0.1">
                    </div>
                    <div>
                        <label>Max Tokens</label>
                        <input type="number" id="llm-primary-max-tokens" value="200" min="50" max="4000">
                    </div>
                    <div>
                        <label>超时 (秒)</label>
                        <input type="number" id="llm-primary-timeout" value="15" min="5" max="120" step="5">
                    </div>
                </div>
            </fieldset>

            <!-- 降级链 -->
            <fieldset class="settings-section">
                <legend>🔗 降级链 <button type="button" id="btn-add-fallback" class="btn btn-sm" style="margin-left:10px;">+ 添加</button></legend>
                <p class="form-hint">主力模型失败时，按顺序尝试降级链中的模型。</p>
                <div id="fallback-list"></div>
            </fieldset>

            <!-- 决策策略 -->
            <fieldset class="settings-section">
                <legend>🎲 决策策略</legend>
                <div class="form-row form-row-3">
                    <div>
                        <label>调用频率</label>
                        <select id="llm-call-frequency">
                            <option value="every">每次决策 (every)</option>
                            <option value="critical">仅关键决策 (critical)</option>
                            <option value="mixed">混合模式 (mixed)</option>
                        </select>
                    </div>
                    <div>
                        <label>每手最少 LLM 调用</label>
                        <input type="number" id="llm-min-decisions" value="1" min="0" max="10">
                    </div>
                    <div>
                        <label>上下文窗口 (手)</label>
                        <input type="number" id="llm-context-window" value="5" min="1" max="20">
                    </div>
                </div>
            </fieldset>

            <!-- 高级功能 -->
            <fieldset class="settings-section">
                <legend>✨ 高级功能</legend>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="llm-prompt-caching" checked> Prompt Caching（节省 Token）</label>
                    <label><input type="checkbox" id="llm-commentary"> AI 解说（每步行为点评）</label>
                    <label><input type="checkbox" id="llm-advisor"> AI 顾问（决策建议提示）</label>
                </div>
            </fieldset>

            <div class="modal-buttons">
                <button id="btn-save-settings" class="btn btn-primary">💾 保存设置</button>
                <button id="btn-close-settings" class="btn">关闭</button>
            </div>
        </div>
    </div>

    <!-- ====== 新游戏弹窗 ====== -->
    <div id="modal-new-game" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>开始新游戏</h2>
            <div class="modal-form">
                <label>你的名字:</label>
                <input type="text" id="input-player-name" value="Hero" maxlength="20">

                <label>起始筹码:</label>
                <input type="number" id="input-starting-chips" value="1000" min="100" max="100000">

                <label>小盲/大盲:</label>
                <div class="input-row">
                    <input type="number" id="input-sb" value="5" min="1" max="1000">
                    <span>/</span>
                    <input type="number" id="input-bb" value="10" min="2" max="2000">
                </div>

                <label>下注结构:</label>
                <select id="input-betting-structure">
                    <option value="no_limit">无限注 (No Limit)</option>
                    <option value="pot_limit">底池限注 (Pot Limit)</option>
                    <option value="fixed_limit">固定限注 (Fixed Limit)</option>
                </select>

                <label>对手数量:</label>
                <select id="input-bot-count">
                    <option value="1">1 人</option>
                    <option value="2">2 人</option>
                    <option value="3">3 人</option>
                    <option value="4">4 人</option>
                    <option value="5" selected>5 人</option>
                    <option value="6">6 人</option>
                    <option value="7">7 人</option>
                    <option value="8">8 人</option>
                </select>

                <label>机器人对手:</label>
                <div id="bot-config-list">
                    <!-- 由 JS 动态生成 -->
                </div>
            </div>
            <div class="modal-buttons">
                <button id="btn-start-game" class="btn btn-primary">开始游戏</button>
                <button id="btn-close-modal" class="btn">取消</button>
            </div>
        </div>
    </div>


    <!-- 结果显示弹窗 -->
    <div id="modal-result" class="modal" style="display:none;">
        <div class="modal-content result-content">
            <h2 id="result-title">🏆 手牌结果</h2>
            <div id="result-body"></div>
            <div class="result-buttons">
                <button id="btn-replay-from-result" class="btn btn-sm">回放本局</button>
                <button id="btn-close-result" class="btn btn-sm btn-primary">继续游戏</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/deck.js"></script>
    <script src="/static/js/table.js"></script>
    <script src="/static/js/controls.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/ui.js"></script>
</body>
</html>
